name: Deploy to Production

permissions:
  contents: read

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy:
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            mkdir -p ~/.ssh
            echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
              -i ~/.ssh/deploy_key \
              ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} 'bash -s' <<'ENDSSH'
            set -e
            cd /opt/regression-tool
            OLD_HEAD=$(git rev-parse HEAD)
            git fetch origin main
            git reset --hard origin/main
            mkdir -p data data/backups
            if git diff --name-only "$OLD_HEAD" HEAD | grep -q "deploy/Caddyfile"; then
              echo "Caddyfile changed — clearing Caddy TLS cache to force cert re-issuance"
              docker compose -f docker-compose.prod.yml rm -sf caddy
              docker volume rm regression-tool_caddy_data || true
            fi
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml restart caddy
            docker compose -f docker-compose.prod.yml ps
            docker image prune -f
            ENDSSH
            SSH_EXIT=$?
            rm -f ~/.ssh/deploy_key
            exit $SSH_EXIT
